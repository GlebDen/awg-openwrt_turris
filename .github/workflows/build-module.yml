name: Create Release on Tag
# on: [workflow_dispatch]
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: "v${{ matrix.build_env.tag }} - ${{ matrix.build_env.pkgarch}} :: ${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}} build"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_env:
          - tag: "24.10"
            pkgarch: arm_cortex-a9_vfpv3-d16
            target: mvebu
            subtarget: cortexa9
            vermagic: "27e1322291d198b059e40717a0aca6fb"
            turris_ref: "v9.0.5" 

    steps:
      - name: Checkout Turris OS Build Scripts
        uses: actions/checkout@v4
        with:
          repository: turris-cz/os-build
          ref: v9.0.5          # Тег, который мы нашли
          path: .              # Явно указываем корень
          fetch-depth: 0
          submodules: recursive

      - name: Cache Tools and Kernel
        id: cache-tools-kernel
        uses: actions/cache@v4
        env:
          cache-name: "cache-tools-kernel-${{ matrix.build_env.tag }}-${{ matrix.build_env.pkgarch}}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}"
        with:
          path: "**"
          key: ${{ runner.os }}-build-vm4-${{ env.cache-name }}
          restore-keys: |
            ${{ runner.os }}-build-vm4-cache-tools-kernel-${{ matrix.build_env.tag }}-${{ matrix.build_env.pkgarch}}-

      - name: Building kernel and tools
        run: |
          # 1. Добавляем репозитории и обновляем списки
          sudo add-apt-repository universe -y
          sudo apt update

          # 2. Установка зависимостей с учетом особенностей Ubuntu 24.04
          # Если libcrypt-compat-dev не найден, пробуем libcrypt-dev
          sudo apt install -y ca-certificates git build-essential zlib1g-dev gawk libssl-dev \
            subversion unzip libncurses-dev wget python3 file rsync gcc-multilib \
            g++-multilib libc6-dev-i386 protobuf-c-compiler which libyaml-dev \
            libwayland-dev libxkbcommon-dev xkeyboard-config || \
            sudo apt install -y libcrypt-dev # Запасной вариант для новых систем
            
          # 2. Проверка скачанных файлов
          echo "Checking directory structure..."
          ls -la
          
          if [ ! -f "compile_pkgs" ]; then
            echo "CRITICAL ERROR: compile_pkgs still not found!"
            echo "Trying to emergency clone..."
            git clone --depth 1 --branch v9.0.5 https://github.com/turris-cz/os-build.git temp_build
            cp -r temp_build/* .
          fi

          # 3. Подготовка Turris (Omnia)
          chmod +x compile_pkgs
          ./compile_pkgs prepare -t omnia

          # После prepare структура OpenWrt появится в текущей папке
          # 4. Добавление AmneziaWG
          echo "src-git awgopenwrt https://github.com/yury-sannikov/awg-openwrt.git" >> ./feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 4. Конфигурация
          make defconfig
          # Форсируем нужный vermagic
          echo "CONFIG_KMOD_VERMAGIC=\"27e1322291d198b059e40717a0aca6fb\"" >> .config
          # Также отключаем проверку хеша при сборке, чтобы ядро не сопротивлялось
          echo "CONFIG_EXTERNAL_KERNEL_TREE=\"\"" >> .config
          echo "CONFIG_KERNEL_GIT_CLONE_URI=\"\"" >> .config
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-amneziawg=y" >> .config
          
          # Зависимости криптографии
          echo "CONFIG_PACKAGE_kmod-crypto-lib-chacha20=m" >> .config
          echo "CONFIG_PACKAGE_kmod-crypto-lib-chacha20poly1305=m" >> .config
          echo "CONFIG_PACKAGE_kmod-crypto-chacha20poly1305=m" >> .config
          
          make defconfig

          # 5. Сборка (самый долгий этап)
          make tools/install -i -j$(nproc)
          make toolchain/install -i -j$(nproc)
          make target/linux/compile -i -j$(nproc) V=s
          echo "--- FINAL VERMAGIC CHECK ---"
          cat ./build_dir/target-*/linux-*/linux-*/.vermagic || echo "Vermagic file not found"
          
      - name: Build AmneziaWG
        run: |
          cd build/
          # Устанавливаем фиды AmneziaWG
          echo "src-git awgopenwrt https://github.com/GlebDen/amneziawg-openwrt.git" >> feeds.conf.default
          ./scripts/feeds update awgopenwrt
          ./scripts/feeds install -a -p awgopenwrt
          
          # Генерируем конфиг (обязательно для Turris)
          make defconfig
          
          # Собираем только нужные пакеты, игнорируя ошибки в других
          make package/kmod-amneziawg/compile V=s -i
          make package/amneziawg-tools/compile V=s -i
          make package/luci-app-amneziawg/compile V=s -i

      - name: Prepare artifacts
        run: |
          tag_name=${{  github.ref_name }}
          mkdir -p awgrelease
          postfix="${tag_name}_v${{ matrix.build_env.tag }}_${{ matrix.build_env.pkgarch}}_${{ matrix.build_env.target}}_${{ matrix.build_env.subtarget}}"
          cp bin/packages/${{ matrix.build_env.pkgarch }}/awgopenwrt/amneziawg-tools_*.ipk awgrelease/amneziawg-tools_${postfix}.ipk
          cp bin/packages/${{ matrix.build_env.pkgarch }}/awgopenwrt/luci-app-amneziawg_*.ipk awgrelease/luci-app-amneziawg_${postfix}.ipk
          cp bin/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}/packages/kmod-amneziawg_*.ipk awgrelease/kmod-amneziawg_${postfix}.ipk

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: awgrelease/*.ipk

